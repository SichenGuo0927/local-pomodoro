<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地番茄钟</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>本地番茄钟</h1>
          <p id="phaseLabel" class="phase-label">专注</p>
        </div>
        <div class="top-actions">
          <div id="cyclePill" class="cycle-pill">1/4</div>
          <button id="settingsToggleButton" class="settings-toggle" type="button" title="设置" aria-haspopup="dialog" aria-expanded="false">⚙</button>
        </div>
      </header>

      <section id="attentionBanner" class="attention-banner" hidden aria-live="polite">
        <strong id="attentionTitle">进入长休息</strong>
        <span id="attentionBody">喝水，站起来走动一下。</span>
      </section>

      <section class="timer-panel" aria-label="番茄钟计时器">
        <div class="timer-ring">
          <div id="timeDisplay" class="time-display">20:00</div>
          <div id="nextLabel" class="next-label">下一段：短休</div>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="controls" aria-label="计时控制">
          <button id="startPauseButton" class="primary-button" type="button" title="开始或暂停">▶ 开始</button>
          <button id="resetButton" class="icon-button" type="button" title="重置当前阶段">↺</button>
          <button id="skipButton" class="icon-button" type="button" title="跳到下一阶段">⏭</button>
        </div>
      </section>

      <dialog id="settingsDialog" class="settings-dialog" aria-labelledby="settingsTitle">
        <section id="settingsPanel" class="settings-panel" aria-label="设置">
          <header class="settings-header">
            <h2 id="settingsTitle">设置</h2>
            <button id="settingsCloseButton" class="settings-close" type="button" title="关闭设置">×</button>
          </header>
          <form id="settingsForm" class="settings-form">
            <label>
              <span>专注时长</span>
              <input id="focusMinutes" name="focusMinutes" type="number" min="1" max="180" step="1" inputmode="numeric" />
            </label>
            <label>
              <span>短休时长（分钟）</span>
              <input id="shortBreakMinutes" name="shortBreakMinutes" type="number" min="0.01" max="60" step="any" inputmode="decimal" />
            </label>
            <label>
              <span>长休时长</span>
              <input id="longBreakMinutes" name="longBreakMinutes" type="number" min="1" max="120" step="1" inputmode="numeric" />
            </label>
            <label>
              <span>长休循环</span>
              <input id="sessionsBeforeLongBreak" name="sessionsBeforeLongBreak" type="number" min="1" max="12" step="1" inputmode="numeric" />
            </label>
            <fieldset class="rest-mode-field">
              <legend>休息模式</legend>
              <div class="rest-mode-options" role="radiogroup" aria-label="休息模式">
                <label>
                  <input id="restModeRelaxed" name="restMode" type="radio" value="relaxed" />
                  <span>轻松模式</span>
                </label>
                <label>
                  <input id="restModeStrict" name="restMode" type="radio" value="strict" />
                  <span>强制模式</span>
                </label>
              </div>
            </fieldset>

            <div class="toggles">
              <label class="toggle-row">
                <input id="autoStartNext" name="autoStartNext" type="checkbox" />
                <span>自动进入下一段</span>
              </label>
              <label class="toggle-row">
                <input id="soundEnabled" name="soundEnabled" type="checkbox" />
                <span>声音提醒</span>
              </label>
              <label class="toggle-row">
                <input id="notificationsEnabled" name="notificationsEnabled" type="checkbox" />
                <span>系统通知</span>
              </label>
            </div>

            <button class="save-button" type="submit">保存设置</button>
          </form>
        </section>
      </dialog>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
