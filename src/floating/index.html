<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地番茄钟倒计时</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="floatingTimer" class="floating-timer" aria-label="本地番茄钟浮动倒计时">
      <button
        id="openButton"
        class="tomato-face"
        type="button"
        title="单击打开；双指单击暂停；双指双击跳过；双指长按停止并重置"
        aria-label="番茄钟控制：单击打开；双指单击暂停；双指双击跳过；双指长按停止并重置"
      >
        <span id="phaseLabel" class="phase-label">专注</span>
        <span id="timeDisplay" class="time-display">20:00</span>
      </button>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
